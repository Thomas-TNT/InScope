# Build installer and create GitHub Release when pushing a version tag (e.g. v1.0.0)
# Usage: git tag v1.0.0 && git push origin v1.0.0

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Set version from tag
        id: version
        run: |
          $ref = "${{ github.ref }}"
          $tag = "${{ github.ref_name }}"
          $v = if ($ref.StartsWith("refs/tags/") -and $tag -match '^v') { $tag.TrimStart('v') } else { "1.0.0" }
          echo "version=$v" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Publish
        run: |
          $version = "${{ steps.version.outputs.version }}"
          dotnet publish -c Release -r win-x64 --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true `
            /p:Version=$version `
            /p:AssemblyVersion=$version `
            -o publish
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: pwsh

      - name: Build installer
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $publishPath = Join-Path $pwd "publish"
          $distPath = Join-Path $pwd "dist"
          New-Item -ItemType Directory -Path $distPath -Force | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=$version" "/DPublishDir=$publishPath" "/DOutputDir=$distPath" installer\InScope.iss
        shell: pwsh

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/InScope-Setup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
